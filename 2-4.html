<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.4</title>
    <style>
    .wrapper{
        height: 100%;
    }
    body{
        background: linear-gradient(90deg, rgb(219, 143, 143), rgb(151, 212, 151), rgb(238, 187, 238));
    }
    h1{
        text-align: center;
        font-size: 60px;
        margin: 15px;
    }
    .sborn1n2{
        display: flex;
        flex-direction: column;
        place-items: center;
        justify-content: center;
        grid-template-rows: 1fr 1fr;
        margin: 25px;
        gap: 25px;
    }
    .num1{
        text-align: center;
        font-size: 50px;
        width: auto;
        border: 3px solid #667eea;
    }
    .num2{
        text-align: center;
        font-size: 50px;
        width: auto;
        border: 3px solid #667eea;
    }
    .result{
        display: flex;
        flex-direction: column;
        place-items: center;
        justify-content: center;
        grid-template-rows: 1fr 1fr;
        margin: 50px;
        gap: 25px;
    }
    .textnum3{
        font-size: 60px;
        font-weight: bold;
    }
    .num3{
        text-align: center;
        font-size: 50px;
        width: auto;
        border: 3px solid #667eea;
    }
    .buttoncol{
        display: grid;
        grid-template-columns: 200px 200px;
        grid-template-rows: 100px 100px;
        gap: 20px;
        place-items: center;
        justify-content: center;
        font-size: 25px;
    }
    .button1{
        display: flex;
        background-color: greenyellow;
        height: 100%;
        width: 100%;
        grid-column: 1/2;
        grid-row: 1/2;
        place-items: center;
        justify-content: center;
    }
    .button1:hover{
        background-color: green;
        color: white;
    }
    .button2{
        display: flex;
        background-color: rgb(255, 143, 143);
        height: 100%;
        width: 100%;
        grid-column: 2/3;
        grid-row: 1/2;
        place-items: center;
        justify-content: center;
    }
    .button2:hover{
        background-color: rgb(255, 0, 0);
        color: white;
    }
    .button3{
        display: flex;
        background-color: rgb(109, 156, 255);
        height: 100%;
        width: 100%;
        grid-column: 1/2;
        grid-row: 2/3;
        place-items: center;
        justify-content: center;
    }
    .button3:hover{
        background-color: blue;
        color: white;
    }
    .button4{
        display: flex;
        background-color: rgb(244, 255, 143);
        height: 100%;
        width: 100%;
        grid-column: 2/3;
        grid-row: 2/3;
        place-items: center;
        justify-content: center;
    }
    .button4:hover{
        background-color: rgb(199, 199, 0);
    }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Калькулятор</h1>
        <div class="sborn1n2">
            <input type="text" id="n1" class="num1" value="">
            <input type="text" id="n2" class="num2" value="">
        </div>
        <div class="buttoncol">
            <button class="button1" id="btn1" onclick="sum()">Сумма</button>
            <button class="button2" id="btn2" onclick="raz()">Разность</button>
            <button class="button3" id="btn3" onclick="pro()">Умножение</button>
            <button class="button4" id="btn4" onclick="cha()">Деление</button>
        </div>
        <div class="result">
            <div class="textnum3">Результат:</div>
            <input type="text" id="n3" class="num3" value="" readonly>
        </div>
    </div>

    <script>
        let input1 = document.getElementById("n1");
        let input2 = document.getElementById("n2");
        let output = document.getElementById("n3");
        
        function sum(){
            let a = parseFloat(input1.value);
            let b = parseFloat(input2.value);
            if (isNaN(a) || isNaN(b)){
                output.value = "Тут не цифры";
            } else {
                output.value = a+b;
            }
        }
        function raz(){
            let a = parseFloat(input1.value);
            let b = parseFloat(input2.value);
            if (isNaN(a) || isNaN(b)){
                output.value = "Тут не цифры";
            } else {
                output.value = a-b;
            }
        }
        function pro(){
            let a = parseFloat(input1.value);
            let b = parseFloat(input2.value);
            if (isNaN(a) || isNaN(b)){
                output.value = "Тут не цифры";
            } else {
                output.value = a*b;
            }
        }
        function cha(){
            let a = parseFloat(input1.value);
            let b = parseFloat(input2.value);
            
            if (isNaN(a) || isNaN(b)){
                output.value = "Тут не цифры";
            } else if (b === 0){
                output.value = "Делить на ноль нельзя";
            } else {
                output.value = a / b;
            }
        }

    </script>
</body>
</html>
